name: Deploy

# Helm-based deployment to the DigitalOcean "stemx" cluster.
#   push to main        -> stage (namespace platformctl-stage, image tag "latest")
#   push tag v*.*.*     -> prod  (namespace platformctl-prod,  image tag = the git tag)
#   workflow_dispatch   -> choose environment + optional image tag
#
# Images are built/pushed by "Build and Push Container Images" on the same event;
# this workflow waits for the gateway image to appear before deploying.
#
# Required GitHub Secrets:
#   KUBECONFIG_B64  - base64-encoded kubeconfig for the target cluster
#   GHCR_PULL_PAT   - PAT (read:packages) used for the in-namespace ghcr-pull secret
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [stage, prod]
        default: stage
      image_tag:
        description: Image tag to deploy (defaults to "latest" for stage, required for prod)
        type: string
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kriipke/platformctl-
  CHART: charts/platformctl
  RELEASE: platformctl

concurrency:
  # Serialize deploys per environment so Helm never fights itself.
  group: deploy-${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'stage') }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'stage') }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target
        id: target
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            TAG="${{ github.event.inputs.image_tag }}"
            if [[ -z "$TAG" ]]; then
              if [[ "$ENV" == "prod" ]]; then
                echo "::error::image_tag is required when manually deploying to prod"; exit 1
              fi
              TAG="latest"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="prod"
            TAG="${{ github.ref_name }}"
          else
            ENV="stage"
            TAG="latest"
          fi
          echo "environment=${ENV}"        >> "$GITHUB_OUTPUT"
          echo "namespace=platformctl-${ENV}" >> "$GITHUB_OUTPUT"
          echo "values=${{ env.CHART }}/values-${ENV}.yaml" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                 >> "$GITHUB_OUTPUT"
          echo "Deploying environment=${ENV} namespace=platformctl-${ENV} tag=${TAG}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_PULL_PAT }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Wait for gateway image
        run: |
          set -euo pipefail
          IMG="${IMAGE_PREFIX}gateway:${{ steps.target.outputs.tag }}"
          echo "Waiting for ${IMG} to be available in GHCR..."
          for i in $(seq 1 40); do
            if docker manifest inspect "$IMG" >/dev/null 2>&1; then
              echo "Found ${IMG}"; exit 0
            fi
            echo "  attempt $i: not yet, retrying in 15s"; sleep 15
          done
          echo "::error::Timed out waiting for ${IMG} (has Build and Push finished?)"; exit 1

      - name: Ensure namespace
        run: kubectl create namespace "${{ steps.target.outputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Ensure image pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull \
            --namespace "${{ steps.target.outputs.namespace }}" \
            --docker-server="$REGISTRY" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_PULL_PAT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade --install
        run: |
          set -euo pipefail
          helm upgrade --install "$RELEASE" "$CHART" \
            --namespace "${{ steps.target.outputs.namespace }}" \
            -f "${{ steps.target.outputs.values }}" \
            --set image.tag="${{ steps.target.outputs.tag }}" \
            --atomic --timeout 10m

      - name: Wait for rollouts
        run: |
          set -euo pipefail
          NS="${{ steps.target.outputs.namespace }}"
          for dep in $(kubectl get deploy -n "$NS" -l app.kubernetes.io/part-of=platformctl-platform -o name); do
            kubectl rollout status "$dep" -n "$NS" --timeout=5m
          done
          kubectl get pods -n "$NS" -l app.kubernetes.io/part-of=platformctl-platform
