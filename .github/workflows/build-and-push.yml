name: Build and Push Container Images

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      force_rebuild:
        description: 'Force rebuild all images'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Job to determine build matrix and metadata
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.matrix }}
      tag: ${{ steps.meta.outputs.tag }}
      environment: ${{ steps.meta.outputs.environment }}
      should_push: ${{ steps.meta.outputs.should_push }}
      changed_services: ${{ steps.changes.outputs.changed_services }}
      skip_unchanged: ${{ steps.changes.outputs.skip_unchanged }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          # Skip change detection for tags, main, or workflow_dispatch
          SKIP_UNCHANGED="false"
          CHANGED_SERVICES='[]'
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger - building all services"
            CHANGED_SERVICES='["gateway","gitops-aggregator","app-sync-svc","environment-validation-svc","context-correlation-svc","multi-environment-kube-svc","customer-git-branch-svc"]'
          elif [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Tag or main branch - building all services"
            CHANGED_SERVICES='["gateway","gitops-aggregator","app-sync-svc","environment-validation-svc","context-correlation-svc","multi-environment-kube-svc","customer-git-branch-svc"]'
          else
            # Detect changes for PR and develop branch builds
            SKIP_UNCHANGED="true"
            
            # Get list of changed files
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
            else
              BASE_SHA="HEAD~1"
            fi
            
            # Get changed files
            CHANGED_FILES=$(git diff --name-only ${BASE_SHA}..HEAD)
            echo "Changed files:"
            echo "$CHANGED_FILES"
            
            # Detect which services were changed
            SERVICES=("gateway" "gitops-aggregator" "app-sync-svc" "environment-validation-svc" "context-correlation-svc" "multi-environment-kube-svc" "customer-git-branch-svc")
            CHANGED=()
            
            for service in "${SERVICES[@]}"; do
              # Check if service-specific files changed
              if echo "$CHANGED_FILES" | grep -E "(^cmd/$service/|^internal/|^pkg/|go\.mod|go\.sum|Dockerfile)" > /dev/null; then
                CHANGED+=("$service")
                echo "Service $service has changes"
              fi
            done
            
            # If core files changed, rebuild all services
            if echo "$CHANGED_FILES" | grep -E "(^internal/|^pkg/|go\.mod|go\.sum|Dockerfile)" > /dev/null; then
              echo "Core files changed - building all services"
              CHANGED=("gateway" "gitops-aggregator" "app-sync-svc" "environment-validation-svc" "context-correlation-svc" "multi-environment-kube-svc" "customer-git-branch-svc")
            fi
            
            # Convert to JSON array
            if [[ ${#CHANGED[@]} -gt 0 ]]; then
              # Build JSON array with proper quoting
              JSON_SERVICES=""
              for i in "${!CHANGED[@]}"; do
                if [[ $i -eq 0 ]]; then
                  JSON_SERVICES="\"${CHANGED[i]}\""
                else
                  JSON_SERVICES="${JSON_SERVICES},\"${CHANGED[i]}\""
                fi
              done
              CHANGED_SERVICES="[${JSON_SERVICES}]"
            else
              CHANGED_SERVICES='[]'
            fi
          fi
          
          echo "skip_unchanged=${SKIP_UNCHANGED}" >> $GITHUB_OUTPUT
          echo "changed_services=${CHANGED_SERVICES}" >> $GITHUB_OUTPUT
          echo "Services to build: ${CHANGED_SERVICES}"

      - name: Setup build metadata
        id: meta
        run: |
          # Determine environment and tag based on branch/tag
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENVIRONMENT="production"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            ENVIRONMENT="development"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            ENVIRONMENT="staging"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="development"
          fi

          # Determine tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="latest"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            TAG="develop"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            TAG="${{ github.ref_name }}-rc"
          else
            TAG="pr-${{ github.event.number }}"
          fi

          # Should we push images (not for PRs unless workflow_dispatch)
          SHOULD_PUSH="false"
          if [[ "${{ github.event_name }}" != "pull_request" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_PUSH="true"
          fi

          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "should_push=${SHOULD_PUSH}" >> $GITHUB_OUTPUT

          echo "Build Environment: ${ENVIRONMENT}"
          echo "Image Tag: ${TAG}"
          echo "Should Push: ${SHOULD_PUSH}"

      - name: Generate services matrix
        id: services
        run: |
          # Use changed services if detection is enabled, otherwise all services
          if [[ "${{ steps.changes.outputs.skip_unchanged }}" == "true" ]]; then
            SERVICES="${{ steps.changes.outputs.changed_services }}"
          else
            SERVICES='["gateway","gitops-aggregator","app-sync-svc","environment-validation-svc","context-correlation-svc","multi-environment-kube-svc","customer-git-branch-svc"]'
          fi
          
          echo "matrix=${SERVICES}" >> $GITHUB_OUTPUT
          echo "Services to build: ${SERVICES}"

  # Job to build and push container images
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: setup
    # Skip if no services to build
    if: needs.setup.outputs.services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # amd64-only: stemx/DO nodes are amd64, so skip the slow QEMU-emulated
          # arm64 build (it also produced a broken image because the Dockerfile
          # pins GOARCH=amd64). Add arm64 back here + fix the Dockerfile if arm64
          # images are ever needed (e.g. local pulls on Apple Silicon).
          platforms: linux/amd64
          driver-opts: |
            network=host

      - name: Log in to Container Registry
        if: needs.setup.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/platformctl-${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.setup.outputs.tag }}
          labels: |
            org.opencontainers.image.title=Platformctl ${{ matrix.service }}
            org.opencontainers.image.description=GitOps-optimized application monitoring platform - ${{ matrix.service }}
            org.opencontainers.image.vendor=Platformctl

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ needs.setup.outputs.should_push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            VERSION=${{ needs.setup.outputs.tag }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
          # Enhanced caching strategy
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=gha,scope=buildkit-base
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}
            type=gha,mode=max,scope=buildkit-base

  # Lightweight security scan (only for pushes to main/tags)
  security-scan:
    name: Security Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.should_push == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
    permissions:
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/platformctl-${{ matrix.service }}:${{ needs.setup.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  # Job to create GitHub release for tags (simplified)
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: startsWith(github.ref, 'refs/tags/v') && needs.setup.outputs.should_push == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Platformctl ${{ github.ref_name }}
          body: |
            ## Platformctl Release ${{ github.ref_name }}
            
            ### Container Images
            All images are available at: `ghcr.io/${{ github.repository_owner }}/platformctl-SERVICE_NAME:${{ github.ref_name }}`
            
            ### Services
            - `ghcr.io/${{ github.repository_owner }}/platformctl-gateway:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/platformctl-gitops-aggregator:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/platformctl-app-sync-svc:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/platformctl-environment-validation-svc:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/platformctl-context-correlation-svc:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/platformctl-multi-environment-kube-svc:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/platformctl-customer-git-branch-svc:${{ github.ref_name }}`
            
            ### Installation
            ```bash
            helm upgrade --install platformctl charts/platformctl \
              --namespace platformctl-prod \
              -f charts/platformctl/values-prod.yaml \
              --set image.tag=${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true