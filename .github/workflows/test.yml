name: Test and Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  GO_VERSION: '1.24.6'

jobs:
  # Go tests and linting
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: |
          go mod download
          go mod verify

      - name: Run go fmt
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not properly formatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests
        run: |
          # -short skips the DB/RabbitMQ integration suites (they guard on
          # testing.Short()); real integration coverage runs in the separate
          # Integration Tests job. DB-backed unit tests skip themselves when
          # TEST_DATABASE_URL is unset (internal/testutil NewTestDB).
          go test -v -race -short -coverprofile=coverage.out ./...

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: go-coverage

  # Helm chart validation
  helm-validation:
    name: Helm Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [stage, prod]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Helm lint
        run: helm lint charts/platformctl -f charts/platformctl/values-${{ matrix.environment }}.yaml

      - name: Render chart
        run: |
          echo "Rendering ${{ matrix.environment }} manifests..."
          helm template platformctl charts/platformctl \
            --namespace platformctl-${{ matrix.environment }} \
            -f charts/platformctl/values-${{ matrix.environment }}.yaml \
            --set image.tag=ci > /tmp/manifests-${{ matrix.environment }}.yaml

      - name: Validate rendered manifests
        run: |
          # Offline schema validation of the environment-specific render. A
          # cluster isn't available in CI (kubectl --dry-run=client still does
          # API discovery and fails), so validate each rendered manifest against
          # the upstream Kubernetes JSON schemas with kubeconform instead.
          # -strict rejects unknown/duplicate fields; -ignore-missing-schemas
          # skips CRD instances that have no published schema.
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          /tmp/kubeconform -strict -ignore-missing-schemas -summary \
            /tmp/manifests-${{ matrix.environment }}.yaml

      - name: Validate security contexts
        run: |
          echo "Validating security contexts..."
          if ! grep -q "runAsNonRoot: true" /tmp/manifests-${{ matrix.environment }}.yaml; then
            echo "Error: runAsNonRoot not set"
            exit 1
          fi

  # Security scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          # -no-fail: report findings via SARIF without failing the build.
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'

      - name: Upload Gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: gosec.sarif

      - name: Run Nancy (dependency vulnerability scanner)
        # Advisory only: the transitive dependency tree (k8s/argo/helm) carries
        # known CVEs that would otherwise fail the whole pipeline.
        continue-on-error: true
        run: |
          go install github.com/sonatypecommunity/nancy@latest
          go list -json -deps ./... | nancy sleuth

  # Docker security and best practices
  docker-validation:
    name: Docker Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SERVICE_NAME=gateway
            VERSION=test
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.run_id }}
          tags: ghcr.io/kriipke/platformctl-gateway:test
          load: true
          cache-from: type=gha,scope=docker-test
          cache-to: type=gha,mode=max,scope=docker-test

      - name: Run Hadolint (Dockerfile linting)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run Dockle (Container security)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:latest ghcr.io/kriipke/platformctl-gateway:test

      - name: Test container image is well-formed
        run: |
          # The gateway needs a database + RabbitMQ to stay up (it runs schema
          # migrations on startup), and neither is available in this job — real
          # startup is exercised by the Integration Tests job against a kind
          # cluster. Here we just smoke-test that the image is well-formed: the
          # service binary is present and executable at the expected path.
          docker run --rm --entrypoint /bin/sh ghcr.io/kriipke/platformctl-gateway:test \
            -c 'test -x /app/platformctl && echo "platformctl binary present and executable"'

  # Integration tests with kind cluster
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Create kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: platformctl-test
          kubectl_version: v1.28.0
          # config is a path to a file, not inline YAML
          config: .github/kind-config.yaml

      - name: Build Docker images for kind
        run: |
          # Build images locally (from current source) and load into kind.
          SERVICES=("gateway" "gitops-aggregator" "app-sync-svc" "environment-validation-svc" "context-correlation-svc" "multi-environment-kube-svc" "customer-git-branch-svc")

          for service in "${SERVICES[@]}"; do
            echo "Building $service for kind..."
            docker build \
              --build-arg SERVICE_NAME=$service \
              --build-arg VERSION=test \
              --build-arg COMMIT_SHA=${{ github.sha }} \
              --build-arg BUILD_DATE=${{ github.run_id }} \
              -t ghcr.io/kriipke/platformctl-$service:test .
            kind load docker-image ghcr.io/kriipke/platformctl-$service:test --name platformctl-test
          done

      - name: Provision namespace, throwaway Postgres, and DB secrets
        run: |
          NS=platformctl-ci
          kubectl create namespace "$NS"
          # Throwaway in-cluster Postgres for the smoke test (the chart itself
          # never deploys Postgres — it consumes DATABASE_URL from these secrets).
          kubectl create deployment postgres --image=postgres:14-alpine -n "$NS"
          kubectl set env deployment/postgres -n "$NS" \
            POSTGRES_USER=platformctl POSTGRES_PASSWORD=platformctl POSTGRES_DB=platformctl
          kubectl expose deployment postgres -n "$NS" --port=5432 --target-port=5432
          kubectl rollout status deployment/postgres -n "$NS" --timeout=180s
          # In CI both direct + pool secrets point at the same throwaway DB.
          URL='postgres://platformctl:platformctl@postgres:5432/platformctl?sslmode=disable'
          kubectl create secret generic platformctl-credentials -n "$NS" --from-literal=DATABASE_URL="$URL"
          kubectl create secret generic platformctl-pool-credentials -n "$NS" --from-literal=DATABASE_URL="$URL"

      - name: Helm install
        run: |
          helm upgrade --install platformctl charts/platformctl \
            --namespace platformctl-ci \
            --set image.tag=test \
            --set rabbitmq.persistence.enabled=false \
            --set-json 'imagePullSecrets=[]' \
            --wait --timeout 6m

      - name: Smoke test gateway health
        run: |
          kubectl port-forward service/platformctl-gateway 8080:80 -n platformctl-ci &
          sleep 10
          if curl -fsS http://localhost:8080/health; then
            echo "Health check passed"
          else
            echo "Health check failed"
            exit 1
          fi

      - name: Show cluster status on failure
        if: failure()
        run: |
          NS=platformctl-ci
          echo "=== Cluster Status ==="
          kubectl get all -n "$NS"
          echo "=== Pod Logs ==="
          kubectl logs -l app.kubernetes.io/part-of=platformctl-platform -n "$NS" --tail=80 || true

  # Deployment scripts validation
  scripts-validation:
    name: Scripts Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          find scripts/ -name "*.sh" -exec shellcheck {} \;

      - name: Test script help messages
        run: |
          chmod +x scripts/*.sh

          # Test help messages
          for script in scripts/*.sh; do
            echo "Testing $script --help"
            $script --help || echo "Help not available for $script"
          done

  # Documentation validation
  docs-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install markdown linter
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          find . -name "*.md" -not -path "./node_modules/*" -exec markdownlint {} \; || true

      - name: Check for broken links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'

      - name: Validate README
        run: |
          if [[ ! -f README.md ]]; then
            echo "README.md not found"
            exit 1
          fi
          
          # Check for required sections
          if ! grep -q "Installation" README.md; then
            echo "README.md missing Installation section"
            exit 1
          fi