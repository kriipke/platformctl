# Prod overlay — deployed to namespace platformctl-prod.
#   helm upgrade --install platformctl charts/platformctl \
#     -n platformctl-prod -f charts/platformctl/values-prod.yaml \
#     --set image.tag=<git-tag>
#
# Only deltas from values.yaml belong here.

config:
  LOG_LEVEL: "info"
  # Shared DO managed Postgres has a small connection limit — keep this low.
  MAX_DB_CONNECTIONS: "2"

# Bundled broker in-cluster (flip to false + set config.RABBITMQ_URL to move to
# a managed broker).
rabbitmq:
  enabled: true
  persistence:
    size: 5Gi

services:
  gateway:
    # Public API ingress. Requires (out-of-band):
    #   1. DNS A record  api.opsdash.dev -> 138.197.242.49  (ingress-nginx LB, DNSimple acct 146978)
    #   2. cert-manager ClusterIssuer `letsencrypt-prod` (present & Ready on stemx)
    # cert-manager issues the TLS cert into secret `platformctl-prod-tls` via the
    # letsencrypt-prod HTTP-01 solver once DNS resolves to the LB.
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - hosts: [api.opsdash.dev]
          secretName: platformctl-prod-tls
      hosts:
        - host: api.opsdash.dev
          path: /
    # Autoscaling is available but off by default (prod currently runs 1 replica
    # against a connection-limited Postgres). Turn on deliberately.
    autoscaling:
      enabled: false
      minReplicas: 3
      maxReplicas: 10
      targetCPU: 70
