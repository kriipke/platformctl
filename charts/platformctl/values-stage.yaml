# Stage overlay — deployed to namespace platformctl-stage.
#   helm upgrade --install platformctl charts/platformctl \
#     -n platformctl-stage -f charts/platformctl/values-stage.yaml \
#     --set image.tag=<tag>
#
# Only deltas from values.yaml belong here.

# Stage deploys the mutable "latest" tag, so nodes must always re-pull to pick up
# a freshly built image (IfNotPresent would serve a stale cached layer). Prod
# pins immutable v*.*.* tags and keeps the IfNotPresent default.
image:
  pullPolicy: Always

config:
  LOG_LEVEL: "debug"
  # Shared DO managed Postgres has a small connection limit — keep this low.
  MAX_DB_CONNECTIONS: "2"

# Bundled broker is fine for stage.
rabbitmq:
  enabled: true

services:
  gateway:
    # Public API ingress. DNS A record api-stage.opsdash.dev -> 138.197.242.49
    # (ingress-nginx LB, DNSimple acct 146978) already resolves. cert-manager
    # issues the TLS cert into secret platformctl-stage-tls via the
    # letsencrypt-prod HTTP-01 solver.
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - hosts: [api-stage.opsdash.dev]
          secretName: platformctl-stage-tls
      hosts:
        - host: api-stage.opsdash.dev
          path: /
