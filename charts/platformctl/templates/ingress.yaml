{{- $gw := .Values.services.gateway | default dict -}}
{{- $ing := $gw.ingress | default dict -}}
{{- if $ing.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "platformctl.fullname" . }}-gateway
  labels:
    {{- include "platformctl.labels" . | nindent 4 }}
    app.kubernetes.io/name: gateway
  {{- with $ing.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ $ing.className | default "nginx" }}
  {{- with $ing.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- range $ing.hosts }}
  - host: {{ .host | quote }}
    http:
      paths:
      - path: {{ .path | default "/" }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "platformctl.fullname" $ }}-gateway
            port:
              number: 80
  {{- end }}
{{- end }}
