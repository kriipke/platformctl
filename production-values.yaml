# Production values for ContextOps Helm Chart
# Matching current kustomize deployment configuration

# Use the existing namespace
namespace: contextops

# Service configuration to match existing setup
gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/kriipke/platformctl-gateway
    tag: develop
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080

gitopsAggregator:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/kriipke/platformctl-gitops-aggregator
    tag: develop
    pullPolicy: Always

# Integration services configuration
integrationServices:
  app-sync-svc:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/kriipke/platformctl-app-sync-svc
      tag: develop
      pullPolicy: Always
  
  environment-validation-svc:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/kriipke/platformctl-environment-validation-svc
      tag: develop
      pullPolicy: Always
  
  context-correlation-svc:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/kriipke/platformctl-context-correlation-svc
      tag: develop
      pullPolicy: Always
  
  multi-environment-kube-svc:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/kriipke/platformctl-multi-environment-kube-svc
      tag: develop
      pullPolicy: Always
  
  customer-git-branch-svc:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/kriipke/platformctl-customer-git-branch-svc
      tag: develop
      pullPolicy: Always

# PostgreSQL configuration (keep existing data)
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: Always
  auth:
    username: "contextops"
    password: "contextops"
    database: "contextops"
  service:
    name: "postgres"
    port: 5432
  persistence:
    size: "10Gi"
    storageClass: "do-block-storage"
  sslMode: "disable"

# RabbitMQ configuration (keep existing data)
rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: "3.12-management-alpine"
    pullPolicy: Always
  auth:
    username: "contextops"
    password: "contextops"
    vhost: "/"
  service:
    name: "rabbitmq"
    port: 5672
    managementPort: 15672
  persistence:
    size: "5Gi"
    storageClass: "do-block-storage"

# LoadBalancer configuration for external access
loadBalancer:
  enabled: true
  provider: "digitalocean"
  externalTrafficPolicy: "Local"
  https:
    enabled: false

# Service discovery enabled
serviceDiscovery:
  enabled: true

# Metrics LoadBalancer disabled (using separate service for now)
metricsLoadBalancer:
  enabled: false

# Configuration matching current setup
config:
  logging:
    level: "info"
    format: "json"
  metrics:
    enabled: true
    port: 9090
  healthCheck:
    port: 8081
  tracing:
    enabled: false
  integrations:
    vault: true
    argocd: true
    git: true
    kubernetes: true
  performance:
    maxConcurrentRequests: 100
    requestTimeout: "30s"
    dbMaxOpenConns: 25
    dbMaxIdleConns: 5
  auth:
    defaultCustomerId: "acme-corp"

# Secrets configuration (same as kustomize)
secrets:
  database:
    username: "contextops"
    password: "contextops"
  rabbitmq:
    username: "contextops"
    password: "contextops"
  jwt:
    secret: "contextops-jwt-secret-change-me"

# RBAC configuration
rbac:
  create: true
  rules:
    argocd: true
    helm: true
    externalSecrets: true
    vault: true

# Service Account configuration
serviceAccount:
  create: true
  automountServiceAccountToken: true

# Kubernetes Integration enabled
kubernetesIntegration:
  enabled: true