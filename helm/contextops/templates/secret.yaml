apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contextops.fullname" . }}-secrets
  namespace: {{ .Values.namespace | default "contextops" }}
  labels:
    {{- include "contextops.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Database credentials (base64 encoded)
  DATABASE_USERNAME: {{ .Values.secrets.database.username | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.database.password | b64enc | quote }}
  
  # RabbitMQ credentials (base64 encoded)
  RABBITMQ_USERNAME: {{ .Values.secrets.rabbitmq.username | b64enc | quote }}
  RABBITMQ_PASSWORD: {{ .Values.secrets.rabbitmq.password | b64enc | quote }}
  
  # JWT secret for API authentication (base64 encoded)
  JWT_SECRET: {{ .Values.secrets.jwt.secret | b64enc | quote }}
  {{- if .Values.secrets.extraSecrets }}
  {{- range $key, $value := .Values.secrets.extraSecrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}