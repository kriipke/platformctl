{{- $services := list "app-sync-svc" "environment-validation-svc" "context-correlation-svc" "multi-environment-kube-svc" "customer-git-branch-svc" }}
{{- range $serviceName := $services }}
{{- $serviceConfig := index $.Values.integrationServices $serviceName }}
{{- if $serviceConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "contextops.fullname" $ }}-{{ $serviceName }}
  namespace: {{ $.Values.namespace | default "contextops" }}
  labels:
    {{- include "contextops.labels" $ | nindent 4 }}
    app.kubernetes.io/component: integration-service
    contextops.io/service: {{ $serviceName }}
spec:
  replicas: {{ $serviceConfig.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "contextops.fullname" $ }}-{{ $serviceName }}
      {{- include "contextops.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        app: {{ include "contextops.fullname" $ }}-{{ $serviceName }}
        {{- include "contextops.labels" $ | nindent 8 }}
        app.kubernetes.io/component: integration-service
        contextops.io/service: {{ $serviceName }}
    spec:
      serviceAccountName: {{ include "contextops.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $serviceConfig.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ $serviceName }}
        image: "{{ $serviceConfig.image.repository }}:{{ $serviceConfig.image.tag | default $.Chart.AppVersion }}"
        imagePullPolicy: {{ $serviceConfig.image.pullPolicy }}
        ports:
        - containerPort: {{ $.Values.config.healthCheck.port }}
          name: health
        - containerPort: {{ $.Values.config.metrics.port }}
          name: metrics
        securityContext:
          {{- toYaml $serviceConfig.securityContext | nindent 10 }}
        env:
        - name: SERVICE_NAME
          value: {{ $serviceName | quote }}
        - name: DATABASE_URL
          value: {{ include "contextops.databaseUrl" $ | quote }}
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "contextops.fullname" $ }}-secrets
              key: DATABASE_USERNAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "contextops.fullname" $ }}-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: DATABASE_NAME
        - name: DATABASE_SSL_MODE
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: DATABASE_SSL_MODE
        - name: RABBITMQ_URL
          value: {{ include "contextops.rabbitmqUrl" $ | quote }}
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "contextops.fullname" $ }}-secrets
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "contextops.fullname" $ }}-secrets
              key: RABBITMQ_PASSWORD
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: RABBITMQ_PORT
        - name: RABBITMQ_VHOST
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: RABBITMQ_VHOST
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: LOG_LEVEL
        - name: LOG_FORMAT
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: LOG_FORMAT
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: METRICS_ENABLED
        - name: HEALTH_CHECK_PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "contextops.fullname" $ }}-config
              key: HEALTH_CHECK_PORT
        {{- range $key, $value := $serviceConfig.extraEnv }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ $.Values.config.healthCheck.port }}
          initialDelaySeconds: {{ $serviceConfig.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ $serviceConfig.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ $serviceConfig.livenessProbe.timeoutSeconds }}
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ $.Values.config.healthCheck.port }}
          initialDelaySeconds: {{ $serviceConfig.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ $serviceConfig.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ $serviceConfig.readinessProbe.timeoutSeconds }}
        resources:
          {{- toYaml $serviceConfig.resources | nindent 10 }}
      {{- with $serviceConfig.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceConfig.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceConfig.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "contextops.fullname" $ }}-{{ $serviceName }}
  namespace: {{ $.Values.namespace | default "contextops" }}
  labels:
    {{- include "contextops.labels" $ | nindent 4 }}
    app.kubernetes.io/component: integration-service
    contextops.io/service: {{ $serviceName }}
  {{- with $serviceConfig.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "contextops.fullname" $ }}-{{ $serviceName }}
  ports:
  - protocol: TCP
    port: {{ $.Values.config.metrics.port }}
    targetPort: {{ $.Values.config.metrics.port }}
    name: metrics
{{- end }}
{{- end }}