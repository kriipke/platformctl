# PostgreSQL configuration
postgres:
  enabled: true
  
  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: Always
  
  # Authentication
  auth:
    username: "contextops"
    password: "contextops"
    database: "contextops"
  
  service:
    name: postgres
    port: 5432
    annotations: {}
  
  # SSL configuration
  sslMode: "disable"
  
  # Persistence
  persistence:
    size: "10Gi"
    storageClass: "do-block-storage"
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    capabilities:
      drop:
        - ALL
  
