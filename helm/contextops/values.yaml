    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraEnv: {}
  
  # Customer Git Branch Service
  customer-git-branch-svc:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/kriipke/platformctl-customer-git-branch-svc
      pullPolicy: Always
      tag: ""
    service:
      annotations: {}
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
