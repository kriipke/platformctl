      timeoutSeconds: 3
      failureThreshold: 3
    nodeSelector: {}
    tolerations: []
    affinity: {}
    extraEnv: {}

# Kubernetes Integration Service configuration
kubernetesIntegration:
  enabled: true

# PostgreSQL configuration
postgres:
  enabled: true
  
  image:
    repository: postgres
    tag: "14-alpine"
    pullPolicy: Always
  
  # Authentication
  auth:
    username: "contextops"
    password: "contextops"
    database: "contextops"
  
  service:
    name: postgres
    port: 5432
    annotations: {}
  
  # SSL configuration
  sslMode: "disable"
  
  # Persistence
  persistence:
    size: "10Gi"
    storageClass: "do-block-storage"
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    capabilities:
      drop:
        - ALL
  
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: {}
  
  # External PostgreSQL configuration (if not using bundled)
  external:
    enabled: false
    connectionString: ""

# RabbitMQ configuration
rabbitmq:
  enabled: true
  
  image:
    repository: rabbitmq
    tag: "3.12-management-alpine"
    pullPolicy: Always
  
  # Authentication
  auth:
    username: "contextops"
    password: "contextops"
    vhost: "/"
  
  service:
    name: rabbitmq
    port: 5672
    managementPort: 15672
    annotations: {}
  
  # Persistence
  persistence:
    size: "5Gi"
    storageClass: "do-block-storage"
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  
  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    capabilities:
      drop:
        - ALL
  
  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 6
  
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 20
    failureThreshold: 3
  
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: {}
  
  # External RabbitMQ configuration (if not using bundled)
  external:
    enabled: false
    connectionString: ""

# Load Balancer configuration
loadBalancer:
  enabled: true
  externalTrafficPolicy: "Local"
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  
  # Cloud provider specific configuration
  provider: "digitalocean"  # aws, azure, gcp, digitalocean
  
  # HTTPS configuration
  https:
    enabled: false
  
  # AWS specific configuration
  aws:
    type: "nlb"
    scheme: "internet-facing"
    crossZoneLoadBalancing: "true"
    targetType: "instance"
  
  # Azure specific configuration
  azure:
    internal: "false"
  
  # GCP specific configuration
  gcp:
    type: "External"
  
  # Health check configuration
  healthCheck:
    intervalSeconds: "30"
    timeoutSeconds: "5"
    healthyThresholdCount: "2"
    unhealthyThresholdCount: "3"
  
  # Additional annotations
  annotations: {}

# Metrics Load Balancer configuration
metricsLoadBalancer:
  enabled: false
  externalTrafficPolicy: "Local"
  
  # Cloud provider specific configuration
  provider: "digitalocean"  # aws, azure, gcp, digitalocean
  
  # AWS specific configuration
  aws:
    type: "nlb"
    crossZoneLoadBalancing: "true"
  
  # Additional annotations
  annotations: {}

# Service Discovery configuration
serviceDiscovery:
  enabled: true