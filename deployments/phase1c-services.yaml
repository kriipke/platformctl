apiVersion: v1
kind: Namespace
metadata:
  name: contextops-services
---
# ConfigMap for common service configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: contextops-config
  namespace: contextops-services
data:
  DATABASE_URL: "postgres://contextops:contextops@postgres:5432/contextops?sslmode=disable"
  RABBITMQ_URL: "amqp://contextops:contextops@rabbitmq:5672/"
  LOG_LEVEL: "info"
  ENABLE_METRICS: "true"
---
# Environment Validation Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: environment-validation-svc
  namespace: contextops-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: environment-validation-svc
  template:
    metadata:
      labels:
        app: environment-validation-svc
    spec:
      containers:
      - name: environment-validation-svc
        image: contextops/environment-validation-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: DATABASE_URL
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: RABBITMQ_URL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: LOG_LEVEL
        - name: VAULT_ENABLED
          value: "true"
        - name: VAULT_ADDRESS
          value: "https://vault.example.com"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: environment-validation-svc
  namespace: contextops-services
spec:
  selector:
    app: environment-validation-svc
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
# App Sync Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-sync-svc
  namespace: contextops-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-sync-svc
  template:
    metadata:
      labels:
        app: app-sync-svc
    spec:
      containers:
      - name: app-sync-svc
        image: contextops/app-sync-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: DATABASE_URL
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: RABBITMQ_URL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: LOG_LEVEL
        - name: ARGOCD_ENABLED
          value: "true"
        - name: ARGOCD_SERVER_URL
          value: "https://argocd.example.com"
        - name: ARGOCD_NAMESPACE
          value: "argocd"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: app-sync-svc
  namespace: contextops-services
spec:
  selector:
    app: app-sync-svc
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
