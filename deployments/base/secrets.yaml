apiVersion: v1
kind: Secret
metadata:
  name: contextops-secrets
  namespace: contextops
  labels:
    app.kubernetes.io/name: contextops-secrets
    app.kubernetes.io/part-of: contextops-platform
type: Opaque
data:
  # Database credentials (base64 encoded)
  # These are example values - replace with actual secrets in overlays
  DATABASE_USERNAME: Y29udGV4dG9wcw== # contextops
  DATABASE_PASSWORD: Y29udGV4dG9wcw== # contextops
  
  # RabbitMQ credentials (base64 encoded)
  RABBITMQ_USERNAME: Y29udGV4dG9wcw== # contextops
  RABBITMQ_PASSWORD: Y29udGV4dG9wcw== # contextops
  
  # JWT secret for API authentication (base64 encoded)
  JWT_SECRET: Y29udGV4dG9wcy1qd3Qtc2VjcmV0LWNoYW5nZS1tZQ== # contextops-jwt-secret-change-me