apiVersion: v1
kind: Secret
metadata:
  name: platformctl-secrets
  namespace: platformctl
  labels:
    app.kubernetes.io/name: platformctl-secrets
    app.kubernetes.io/part-of: platformctl-platform
type: Opaque
data:
  # Database credentials (base64 encoded)
  # These are example values - replace with actual secrets in overlays
  DATABASE_USERNAME: Y29udGV4dG9wcw== # platformctl
  DATABASE_PASSWORD: Y29udGV4dG9wcw== # platformctl
  
  # RabbitMQ credentials (base64 encoded)
  RABBITMQ_USERNAME: Y29udGV4dG9wcw== # platformctl
  RABBITMQ_PASSWORD: Y29udGV4dG9wcw== # platformctl
  
  # JWT secret for API authentication (base64 encoded)
  JWT_SECRET: Y29udGV4dG9wcy1qd3Qtc2VjcmV0LWNoYW5nZS1tZQ== # platformctl-jwt-secret-change-me