# ServiceAccount for Platformctl services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platformctl-service-account
  namespace: platformctl
  labels:
    app.kubernetes.io/name: platformctl-service-account
    app.kubernetes.io/part-of: platformctl-platform
automountServiceAccountToken: true
---
# ServiceAccount for GitOps Aggregator (needs additional permissions for read model operations)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-aggregator-service-account
  namespace: platformctl
  labels:
    app.kubernetes.io/name: gitops-aggregator-service-account
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/component: aggregator
automountServiceAccountToken: true
---
# ServiceAccount for Kubernetes Integration Service (needs cluster access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-integration-service-account
  namespace: platformctl
  labels:
    app.kubernetes.io/name: kubernetes-integration-service-account
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/component: integration-service
automountServiceAccountToken: true
---
# ClusterRole for Kubernetes integration (read-only access to monitor GitOps resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platformctl-kubernetes-reader
  labels:
    app.kubernetes.io/name: platformctl-kubernetes-reader
    app.kubernetes.io/part-of: platformctl-platform
rules:
# ApplicationSet and ArgoCD Application monitoring
- apiGroups: ["argoproj.io"]
  resources: 
    - applications
    - applicationsets
    - appprojects
  verbs: ["get", "list", "watch"]
# Kubernetes native resources for GitOps monitoring
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - configmaps
    - secrets
    - persistentvolumeclaims
    - persistentvolumes
    - nodes
    - namespaces
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources:
    - poddisruptionbudgets
  verbs: ["get", "list", "watch"]
# Helm resources for monitoring Helm deployments
- apiGroups: [""]
  resources:
    - secrets
  verbs: ["get", "list"]
  resourceNames: ["sh.helm.release.v1.*"]
# External-secrets operator resources
- apiGroups: ["external-secrets.io"]
  resources:
    - externalsecrets
    - secretstores
    - clustersecretstores
  verbs: ["get", "list", "watch"]
# VaultStaticSecret monitoring (if using Vault CSI driver or Vault operator)
- apiGroups: ["secrets.hashicorp.com"]
  resources:
    - vaultstaticsecrets
    - vaultconnections
  verbs: ["get", "list", "watch"]
---
# ClusterRole for GitOps aggregator (additional permissions for aggregation operations)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platformctl-aggregator
  labels:
    app.kubernetes.io/name: platformctl-aggregator
    app.kubernetes.io/part-of: platformctl-platform
rules:
# Inherit all kubernetes reader permissions
- apiGroups: ["argoproj.io"]
  resources: 
    - applications
    - applicationsets
    - appprojects
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - configmaps
    - secrets
    - persistentvolumeclaims
    - persistentvolumes
    - nodes
    - namespaces
    - events  # Additional permission for event aggregation
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]
# Additional permissions for metrics and monitoring
- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs: ["get", "list"]
---
# Role for Platformctl services within their namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: platformctl
  name: platformctl-service-role
  labels:
    app.kubernetes.io/name: platformctl-service-role
    app.kubernetes.io/part-of: platformctl-platform
rules:
# Access to ConfigMaps and Secrets within namespace
- apiGroups: [""]
  resources:
    - configmaps
    - secrets
  verbs: ["get", "list", "watch"]
# Access to service endpoints for health checking
- apiGroups: [""]
  resources:
    - endpoints
    - services
  verbs: ["get", "list", "watch"]
# Access to pods for debugging and health checking
- apiGroups: [""]
  resources:
    - pods
    - pods/log
  verbs: ["get", "list", "watch"]
# Access to events for logging and monitoring
- apiGroups: [""]
  resources:
    - events
  verbs: ["get", "list", "watch", "create"]
---
# ClusterRoleBinding for Kubernetes integration service
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platformctl-kubernetes-integration
  labels:
    app.kubernetes.io/name: platformctl-kubernetes-integration
    app.kubernetes.io/part-of: platformctl-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platformctl-kubernetes-reader
subjects:
- kind: ServiceAccount
  name: kubernetes-integration-service-account
  namespace: platformctl
---
# ClusterRoleBinding for GitOps aggregator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platformctl-aggregator-binding
  labels:
    app.kubernetes.io/name: platformctl-aggregator-binding
    app.kubernetes.io/part-of: platformctl-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platformctl-aggregator
subjects:
- kind: ServiceAccount
  name: gitops-aggregator-service-account
  namespace: platformctl
---
# RoleBinding for Platformctl services within their namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: platformctl
  name: platformctl-service-binding
  labels:
    app.kubernetes.io/name: platformctl-service-binding
    app.kubernetes.io/part-of: platformctl-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platformctl-service-role
subjects:
- kind: ServiceAccount
  name: platformctl-service-account
  namespace: platformctl
- kind: ServiceAccount
  name: gitops-aggregator-service-account
  namespace: platformctl
# SecurityContextConstraints (OpenShift-only) intentionally removed: this is a
# vanilla Kubernetes cluster. Pod/container securityContext blocks in the
# deployments enforce runAsNonRoot, drop-ALL capabilities, and no privilege
# escalation, which is the portable equivalent.