# ServiceAccount for ContextOps services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: contextops-service-account
  namespace: contextops
  labels:
    app.kubernetes.io/name: contextops-service-account
    app.kubernetes.io/part-of: contextops-platform
automountServiceAccountToken: true
---
# ServiceAccount for GitOps Aggregator (needs additional permissions for read model operations)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-aggregator-service-account
  namespace: contextops
  labels:
    app.kubernetes.io/name: gitops-aggregator-service-account
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/component: aggregator
automountServiceAccountToken: true
---
# ServiceAccount for Kubernetes Integration Service (needs cluster access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-integration-service-account
  namespace: contextops
  labels:
    app.kubernetes.io/name: kubernetes-integration-service-account
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/component: integration-service
automountServiceAccountToken: true
---
# ClusterRole for Kubernetes integration (read-only access to monitor GitOps resources)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contextops-kubernetes-reader
  labels:
    app.kubernetes.io/name: contextops-kubernetes-reader
    app.kubernetes.io/part-of: contextops-platform
rules:
# ApplicationSet and ArgoCD Application monitoring
- apiGroups: ["argoproj.io"]
  resources: 
    - applications
    - applicationsets
    - appprojects
  verbs: ["get", "list", "watch"]
# Kubernetes native resources for GitOps monitoring
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - configmaps
    - secrets
    - persistentvolumeclaims
    - persistentvolumes
    - nodes
    - namespaces
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
  verbs: ["get", "list", "watch"]
- apiGroups: ["policy"]
  resources:
    - poddisruptionbudgets
  verbs: ["get", "list", "watch"]
# Helm resources for monitoring Helm deployments
- apiGroups: [""]
  resources:
    - secrets
  verbs: ["get", "list"]
  resourceNames: ["sh.helm.release.v1.*"]
# External-secrets operator resources
- apiGroups: ["external-secrets.io"]
  resources:
    - externalsecrets
    - secretstores
    - clustersecretstores
  verbs: ["get", "list", "watch"]
# VaultStaticSecret monitoring (if using Vault CSI driver or Vault operator)
- apiGroups: ["secrets.hashicorp.com"]
  resources:
    - vaultstaticsecrets
    - vaultconnections
  verbs: ["get", "list", "watch"]
---
# ClusterRole for GitOps aggregator (additional permissions for aggregation operations)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contextops-aggregator
  labels:
    app.kubernetes.io/name: contextops-aggregator
    app.kubernetes.io/part-of: contextops-platform
rules:
# Inherit all kubernetes reader permissions
- apiGroups: ["argoproj.io"]
  resources: 
    - applications
    - applicationsets
    - appprojects
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
    - pods
    - services
    - endpoints
    - configmaps
    - secrets
    - persistentvolumeclaims
    - persistentvolumes
    - nodes
    - namespaces
    - events  # Additional permission for event aggregation
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs: ["get", "list", "watch"]
# Additional permissions for metrics and monitoring
- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs: ["get", "list"]
---
# Role for ContextOps services within their namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: contextops
  name: contextops-service-role
  labels:
    app.kubernetes.io/name: contextops-service-role
    app.kubernetes.io/part-of: contextops-platform
rules:
# Access to ConfigMaps and Secrets within namespace
- apiGroups: [""]
  resources:
    - configmaps
    - secrets
  verbs: ["get", "list", "watch"]
# Access to service endpoints for health checking
- apiGroups: [""]
  resources:
    - endpoints
    - services
  verbs: ["get", "list", "watch"]
# Access to pods for debugging and health checking
- apiGroups: [""]
  resources:
    - pods
    - pods/log
  verbs: ["get", "list", "watch"]
# Access to events for logging and monitoring
- apiGroups: [""]
  resources:
    - events
  verbs: ["get", "list", "watch", "create"]
---
# ClusterRoleBinding for Kubernetes integration service
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: contextops-kubernetes-integration
  labels:
    app.kubernetes.io/name: contextops-kubernetes-integration
    app.kubernetes.io/part-of: contextops-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: contextops-kubernetes-reader
subjects:
- kind: ServiceAccount
  name: kubernetes-integration-service-account
  namespace: contextops
---
# ClusterRoleBinding for GitOps aggregator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: contextops-aggregator-binding
  labels:
    app.kubernetes.io/name: contextops-aggregator-binding
    app.kubernetes.io/part-of: contextops-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: contextops-aggregator
subjects:
- kind: ServiceAccount
  name: gitops-aggregator-service-account
  namespace: contextops
---
# RoleBinding for ContextOps services within their namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: contextops
  name: contextops-service-binding
  labels:
    app.kubernetes.io/name: contextops-service-binding
    app.kubernetes.io/part-of: contextops-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: contextops-service-role
subjects:
- kind: ServiceAccount
  name: contextops-service-account
  namespace: contextops
- kind: ServiceAccount
  name: gitops-aggregator-service-account
  namespace: contextops
---
# Security Context Constraints for OpenShift (if applicable)
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: contextops-scc
  labels:
    app.kubernetes.io/name: contextops-scc
    app.kubernetes.io/part-of: contextops-platform
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: false
allowedCapabilities: []
allowedFlexVolumes: []
defaultAddCapabilities: []
fsGroup:
  type: MustRunAs
  ranges:
  - min: 1000
    max: 1000
priority: 10
readOnlyRootFilesystem: false
requiredDropCapabilities:
- ALL
runAsUser:
  type: MustRunAsNonRoot
  uid: 1000
seLinuxContext:
  type: MustRunAs
  seLinuxOptions:
    user: system_u
    role: system_r
    type: container_t
    level: s0:c123,c456
supplementalGroups:
  type: MustRunAs
  ranges:
  - min: 1000
    max: 1000
users:
- system:serviceaccount:contextops:contextops-service-account
- system:serviceaccount:contextops:gitops-aggregator-service-account
- system:serviceaccount:contextops:kubernetes-integration-service-account
volumes:
- configMap
- downwardAPI
- emptyDir
- persistentVolumeClaim
- projected
- secret