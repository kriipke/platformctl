# ServiceMonitor for Prometheus to scrape metrics from all Platformctl services
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platformctl-services
  namespace: platformctl
  labels:
    app.kubernetes.io/name: platformctl-services-monitor
    app.kubernetes.io/part-of: platformctl-platform
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: platformctl-platform
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'platformctl_.*'
      action: keep
    - sourceLabels: [instance]
      targetLabel: platformctl_instance
    - sourceLabels: [job]
      targetLabel: platformctl_service
  namespaceSelector:
    matchNames:
    - platformctl
    - platformctl-dev
    - platformctl-prod
---
# PrometheusRule for Platformctl alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platformctl-alerts
  namespace: platformctl
  labels:
    app.kubernetes.io/name: platformctl-alerts
    app.kubernetes.io/part-of: platformctl-platform
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: platformctl.rules
    interval: 30s
    rules:
    # Service availability alerts
    - alert: PlatformctlServiceDown
      expr: up{job=~"platformctl.*"} == 0
      for: 2m
      labels:
        severity: critical
        service: platformctl
      annotations:
        summary: "Platformctl service {{ $labels.job }} is down"
        description: "{{ $labels.job }} service has been down for more than 2 minutes."
    
    # High error rate alert
    - alert: PlatformctlHighErrorRate
      expr: rate(platformctl_http_requests_total{status=~"5.."}[5m]) / rate(platformctl_http_requests_total[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
        service: platformctl
      annotations:
        summary: "High error rate in Platformctl {{ $labels.service }}"
        description: "{{ $labels.service }} has error rate above 10% (current: {{ $value | humanizePercentage }})"
    
    # High response time alert
    - alert: PlatformctlHighLatency
      expr: histogram_quantile(0.95, rate(platformctl_http_request_duration_seconds_bucket[5m])) > 0.5
      for: 5m
      labels:
        severity: warning
        service: platformctl
      annotations:
        summary: "High latency in Platformctl {{ $labels.service }}"
        description: "{{ $labels.service }} 95th percentile latency is {{ $value | humanizeDuration }}"
    
    # Database connection issues
    - alert: PlatformctlDatabaseConnectionIssues
      expr: platformctl_database_connections_failed_total > 0
      for: 1m
      labels:
        severity: critical
        service: platformctl
      annotations:
        summary: "Platformctl database connection failures"
        description: "{{ $labels.service }} is experiencing database connection failures"
    
    # RabbitMQ connection issues
    - alert: PlatformctlRabbitMQConnectionIssues
      expr: platformctl_rabbitmq_connections_failed_total > 0
      for: 1m
      labels:
        severity: critical
        service: platformctl
      annotations:
        summary: "Platformctl RabbitMQ connection failures"
        description: "{{ $labels.service }} is experiencing RabbitMQ connection failures"
    
    # GitOps operation failures
    - alert: PlatformctlGitOpsOperationFailures
      expr: increase(platformctl_gitops_operations_failed_total[10m]) > 5
      for: 2m
      labels:
        severity: warning
        service: platformctl
      annotations:
        summary: "Platformctl GitOps operation failures"
        description: "{{ $labels.service }} has {{ $value }} GitOps operation failures in the last 10 minutes"
    
    # Resource usage alerts
    - alert: PlatformctlHighMemoryUsage
      expr: (container_memory_working_set_bytes{pod=~"platformctl-.*"} / container_spec_memory_limit_bytes{pod=~"platformctl-.*"}) > 0.8
      for: 5m
      labels:
        severity: warning
        service: platformctl
      annotations:
        summary: "Platformctl high memory usage"
        description: "{{ $labels.pod }} memory usage is above 80% (current: {{ $value | humanizePercentage }})"
    
    - alert: PlatformctlHighCPUUsage
      expr: rate(container_cpu_usage_seconds_total{pod=~"platformctl-.*"}[5m]) / (container_spec_cpu_quota{pod=~"platformctl-.*"} / 100000) > 0.8
      for: 5m
      labels:
        severity: warning
        service: platformctl
      annotations:
        summary: "Platformctl high CPU usage"
        description: "{{ $labels.pod }} CPU usage is above 80% (current: {{ $value | humanizePercentage }})"