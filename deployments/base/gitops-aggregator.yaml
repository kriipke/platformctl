apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-aggregator
  namespace: contextops
  labels:
    app.kubernetes.io/name: gitops-aggregator
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/component: aggregator
spec:
  replicas: 1  # Single replica for read model consistency
  selector:
    matchLabels:
      app: gitops-aggregator
  template:
    metadata:
      labels:
        app: gitops-aggregator
        app.kubernetes.io/name: gitops-aggregator
        app.kubernetes.io/part-of: contextops-platform
        app.kubernetes.io/component: aggregator
    spec:
      serviceAccountName: gitops-aggregator-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: gitops-aggregator
        image: ghcr.io/kriipke/platformctl-gitops-aggregator:develop
        ports:
        - containerPort: 8081
          name: health
        - containerPort: 9090
          name: metrics
        env:
        - name: SERVICE_NAME
          value: "gitops-aggregator"
        - name: DATABASE_URL
          value: "postgres://contextops:contextops@postgres:5432/contextops?sslmode=disable"
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: contextops-secrets
              key: DATABASE_USERNAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: contextops-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: DATABASE_NAME
        - name: DATABASE_SSL_MODE
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: DATABASE_SSL_MODE
        - name: RABBITMQ_URL
          value: "amqp://contextops:contextops@rabbitmq:5672/"
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: contextops-secrets
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: contextops-secrets
              key: RABBITMQ_PASSWORD
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: RABBITMQ_PORT
        - name: RABBITMQ_VHOST
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: RABBITMQ_VHOST
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: LOG_LEVEL
        - name: LOG_FORMAT
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: LOG_FORMAT
        - name: METRICS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: METRICS_ENABLED
        - name: HEALTH_CHECK_PORT
          valueFrom:
            configMapKeyRef:
              name: contextops-config
              key: HEALTH_CHECK_PORT
        - name: AGGREGATION_INTERVAL
          value: "30s"
        - name: BATCH_SIZE
          value: "100"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-aggregator
  namespace: contextops
  labels:
    app.kubernetes.io/name: gitops-aggregator
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/component: aggregator
spec:
  selector:
    app: gitops-aggregator
  ports:
  - protocol: TCP
    port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP