apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platformctl-ingress
  namespace: platformctl-staging
  labels:
    app.kubernetes.io/name: platformctl-ingress
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://staging.platformctl.com,https://platformctl-staging.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    # Staging-specific annotations
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Environment: staging";
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - staging.platformctl.com
    - platformctl-staging.example.com
    secretName: platformctl-staging-tls
  rules:
  - host: staging.platformctl.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gateway
            port:
              number: 80
  - host: platformctl-staging.example.com
    http:
      paths:
      # API endpoints
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gateway
            port:
              number: 80
      # Health and debug endpoints
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gateway
            port:
              number: 80
      - path: /debug
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gateway
            port:
              number: 80
      # Test routes (staging only)
      - path: /test
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gateway
            port:
              number: 80
---
# Separate metrics ingress for staging monitoring
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platformctl-metrics-ingress
  namespace: platformctl-staging
  labels:
    app.kubernetes.io/name: platformctl-metrics-ingress
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: staging
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: platformctl-metrics-auth
    nginx.ingress.kubernetes.io/auth-realm: "Platformctl Staging Metrics"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - metrics-staging.platformctl.com
    secretName: platformctl-staging-metrics-tls
  rules:
  - host: metrics-staging.platformctl.com
    http:
      paths:
      - path: /gateway
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gateway
            port:
              number: 9090
      - path: /aggregator
        pathType: Prefix
        backend:
          service:
            name: staging-platformctl-gitops-aggregator
            port:
              number: 9090