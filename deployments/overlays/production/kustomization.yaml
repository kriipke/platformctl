apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: platformctl-production
  annotations:
    config.kubernetes.io/local-config: "true"

# Base configuration to extend
resources:
  - ../../base
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policy.yaml

# Production namespace
namespace: platformctl-prod

# Environment-specific name prefix
namePrefix: prod-

# Common labels for production environment
commonLabels:
  app.kubernetes.io/environment: production
  app.kubernetes.io/instance: platformctl-prod

# Production-specific annotations
commonAnnotations:
  deployment.kubernetes.io/environment: production
  platformctl.io/deployment-target: production
  platformctl.io/backup-enabled: "true"
  platformctl.io/monitoring-level: "high"

# Image tags for production (specific versions, not latest)
images:
  - name: ghcr.io/kriipke/platformctl-gateway
    newTag: v1.0.0
  - name: ghcr.io/kriipke/platformctl-gitops-aggregator
    newTag: v1.0.0
  - name: ghcr.io/kriipke/platformctl-app-sync-svc
    newTag: v1.0.0
  - name: ghcr.io/kriipke/platformctl-environment-validation-svc
    newTag: v1.0.0
  - name: ghcr.io/kriipke/platformctl-context-correlation-svc
    newTag: v1.0.0
  - name: ghcr.io/kriipke/platformctl-multi-environment-kube-svc
    newTag: v1.0.0
  - name: ghcr.io/kriipke/platformctl-customer-git-branch-svc
    newTag: v1.0.0

# Configuration patches for production environment
patches:
  # Increase resource allocations for production
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/component=api-gateway"
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"

  # Production logging configuration
  - target:
      kind: ConfigMap
      name: platformctl-config
    patch: |-
      - op: replace
        path: /data/LOG_LEVEL
        value: "info"
      - op: add
        path: /data/ENABLE_DEBUG_ENDPOINTS
        value: "false"
      - op: add
        path: /data/CORS_ALLOW_ALL
        value: "false"
      - op: add
        path: /data/RATE_LIMIT_ENABLED
        value: "true"
      - op: add
        path: /data/RATE_LIMIT_RPS
        value: "100"
      - op: add
        path: /data/BACKUP_ENABLED
        value: "true"
      - op: add
        path: /data/BACKUP_SCHEDULE
        value: "0 2 * * *"

  # Production database configuration (larger storage and performance settings)
  - target:
      kind: PersistentVolumeClaim
      name: postgres-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: "50Gi"
      - op: replace
        path: /spec/storageClassName
        value: "ssd"

  # Production RabbitMQ configuration
  - target:
      kind: PersistentVolumeClaim
      name: rabbitmq-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: "20Gi"
      - op: replace
        path: /spec/storageClassName
        value: "ssd"

  # Add security context to all deployments
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000

  # Production probe settings (more conservative)
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/initialDelaySeconds
        value: 60
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/periodSeconds
        value: 30
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/initialDelaySeconds
        value: 30
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/periodSeconds
        value: 10

# Production replica counts (high availability)
replicas:
  - name: gateway
    count: 3
  - name: gitops-aggregator
    count: 1  # Single instance for read model consistency
  - name: app-sync-svc
    count: 3
  - name: environment-validation-svc
    count: 3
  - name: context-correlation-svc
    count: 2
  - name: multi-environment-kube-svc
    count: 2
  - name: customer-git-branch-svc
    count: 2