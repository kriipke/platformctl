# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: default-deny-ingress
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# Allow ingress to Gateway from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: allow-gateway-ingress
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
---
# Allow Gateway to access PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-access
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: allow-postgres-access
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: platformctl-platform
    ports:
    - protocol: TCP
      port: 5432
---
# Allow all services to access RabbitMQ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-access
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: allow-rabbitmq-access
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: platformctl-platform
    ports:
    - protocol: TCP
      port: 5672
  # Allow monitoring access to management interface
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 15672
---
# Allow metrics scraping from all services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scraping
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: allow-metrics-scraping
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: platformctl-platform
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 8081
---
# Allow DNS resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: allow-dns
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: platformctl-platform
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# Allow outbound HTTPS for external integrations (ArgoCD, Vault, Git, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-https
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: allow-external-https
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: integration-service
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80