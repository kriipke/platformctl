# Pod Disruption Budget for Gateway
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-pdb
  namespace: contextops-prod
  labels:
    app.kubernetes.io/name: gateway-pdb
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/environment: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: gateway
---
# Pod Disruption Budget for GitOps Aggregator (single instance)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gitops-aggregator-pdb
  namespace: contextops-prod
  labels:
    app.kubernetes.io/name: gitops-aggregator-pdb
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/environment: production
spec:
  maxUnavailable: 0  # Never disrupt the single aggregator instance
  selector:
    matchLabels:
      app: gitops-aggregator
---
