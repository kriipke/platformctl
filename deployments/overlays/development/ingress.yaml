apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platformctl-ingress
  namespace: platformctl-dev
  labels:
    app.kubernetes.io/name: platformctl-ingress
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: development
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - platformctl-dev.example.com
    secretName: platformctl-dev-tls
  rules:
  - host: platformctl-dev.example.com
    http:
      paths:
      # API Gateway routes
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-gateway
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-gateway
            port:
              number: 80
      # RabbitMQ Management (development only)
      - path: /rabbitmq
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-rabbitmq-management
            port:
              number: 15672
  # Metrics endpoints for Prometheus scraping
  - host: metrics-dev.platformctl.example.com
    http:
      paths:
      - path: /gateway/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-gateway
            port:
              number: 9090
      - path: /aggregator/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-gitops-aggregator
            port:
              number: 9090
      - path: /app-sync/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-app-sync-svc
            port:
              number: 9090
      - path: /environment-validation/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-environment-validation-svc
            port:
              number: 9090
      - path: /context-correlation/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-context-correlation-svc
            port:
              number: 9090
      - path: /multi-environment-kube/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-multi-environment-kube-svc
            port:
              number: 9090
      - path: /customer-git-branch/metrics
        pathType: Prefix
        backend:
          service:
            name: dev-platformctl-customer-git-branch-svc
            port:
              number: 9090