# Secret generator configuration for different environments
apiVersion: builtin
kind: SecretGenerator
metadata:
  name: platformctl-env-secrets
  annotations:
    config.kubernetes.io/local-config: "true"
    platformctl.io/secret-rotation: "quarterly"

# Base secret configuration
secretName: platformctl-env-secrets
behavior: replace
type: Opaque

# Environment-specific secret files
files:
- development.env=secrets/development.env
- staging.env=secrets/staging.env
- production.env=secrets/production.env

# Common literals (will be overridden by environment-specific values)
literals:
- DATABASE_ENCRYPTION_KEY=CHANGE_ME_IN_PRODUCTION
- JWT_SIGNING_KEY=CHANGE_ME_IN_PRODUCTION
- WEBHOOK_SECRET=CHANGE_ME_IN_PRODUCTION
- API_ENCRYPTION_KEY=CHANGE_ME_IN_PRODUCTION

# Secret generation options
options:
  disableNameSuffixHash: false
  immutable: true