# Production environment configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: environment-config
  namespace: platformctl-prod
  labels:
    app.kubernetes.io/name: environment-config
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: production
  annotations:
    platformctl.io/environment: production
    platformctl.io/config-version: "1.0.0"
    platformctl.io/backup-enabled: "true"
    platformctl.io/monitoring-level: "critical"
data:
  # Environment identification
  ENVIRONMENT: "production"
  ENVIRONMENT_SHORT: "prod"
  CLUSTER_NAME: "platformctl-prod-cluster"
  
  # Feature flags for production (security-first)
  ENABLE_DEBUG_LOGGING: "false"
  ENABLE_TEST_ENDPOINTS: "false"
  ENABLE_CORS_ALL_ORIGINS: "false"
  ENABLE_SWAGGER_UI: "false"
  ENABLE_METRICS_DEBUG: "false"
  ENABLE_PROFILING: "false"
  
  # Production integrations (secure)
  VAULT_SKIP_VERIFY: "false"
  ARGOCD_INSECURE: "false"
  GIT_CLONE_DEPTH: "1"
  TLS_VERIFY: "true"
  
  # Performance settings (production optimized)
  REQUEST_TIMEOUT: "30s"
  DB_CONNECTION_TIMEOUT: "10s"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "200"
  CIRCUIT_BREAKER_ENABLED: "true"
  
  # Production URLs and endpoints
  FRONTEND_URL: "https://platformctl.com"
  API_BASE_URL: "https://api.platformctl.com"
  WEBHOOKS_BASE_URL: "https://api.platformctl.com/webhooks"
  
  # Production database settings
  DB_LOG_QUERIES: "false"
  DB_MIGRATE_ON_START: "false"
  DB_POOL_SIZE: "25"
  DB_MAX_IDLE_CONNECTIONS: "5"
  DB_CONNECTION_MAX_LIFETIME: "5m"
  
  # Production message queue settings
  RABBITMQ_MANAGEMENT_ENABLED: "false"
  RABBITMQ_LOG_LEVEL: "error"
  RABBITMQ_HEARTBEAT: "60s"
  
  # Resource limits (production)
  MAX_CONCURRENT_REQUESTS: "500"
  MAX_MEMORY_USAGE: "2Gi"
  MAX_CPU_USAGE: "2000m"
  
  # Security settings
  SECURITY_HEADERS_ENABLED: "true"
  CSRF_PROTECTION_ENABLED: "true"
  JWT_EXPIRY: "1h"
  SESSION_TIMEOUT: "30m"
  
  # Backup and disaster recovery
  BACKUP_ENABLED: "true"
  BACKUP_SCHEDULE: "0 2 * * *"
  BACKUP_RETENTION: "30d"
  DISASTER_RECOVERY_ENABLED: "true"
  
  # Monitoring and observability
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.01"
  METRICS_RETENTION: "30d"
  LOG_RETENTION: "90d"
  ALERTING_ENABLED: "true"
  
  # Compliance and auditing
  AUDIT_LOGGING_ENABLED: "true"
  COMPLIANCE_CHECKS_ENABLED: "true"
  PCI_COMPLIANCE_MODE: "false"
  SOX_COMPLIANCE_MODE: "false"
  GDPR_COMPLIANCE_MODE: "true"