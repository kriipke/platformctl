# ConfigMap generator for environment-specific configurations
apiVersion: builtin
kind: ConfigMapGenerator
metadata:
  name: platformctl-env-config
  annotations:
    config.kubernetes.io/local-config: "true"

# Environment configuration maps
configMapName: platformctl-env-config
behavior: replace

# Environment-specific configuration files
files:
- config/development.yaml
- config/staging.yaml
- config/production.yaml

# Common configuration literals
literals:
- APPLICATION_NAME=Platformctl
- APPLICATION_VERSION=v1.0.0
- SUPPORTED_ENVIRONMENTS=development,staging,production
- DEFAULT_TIMEZONE=UTC
- DEFAULT_LOCALE=en_US

# Configuration generation options
options:
  disableNameSuffixHash: false
  immutable: false