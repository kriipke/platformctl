# Staging environment configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: environment-config
  namespace: contextops-staging
  labels:
    app.kubernetes.io/name: environment-config
    app.kubernetes.io/part-of: contextops-platform
    app.kubernetes.io/environment: staging
  annotations:
    contextops.io/environment: staging
    contextops.io/config-version: "1.0.0"
data:
  # Environment identification
  ENVIRONMENT: "staging"
  ENVIRONMENT_SHORT: "staging"
  CLUSTER_NAME: "contextops-staging-cluster"
  
  # Feature flags for staging (production-like)
  ENABLE_DEBUG_LOGGING: "false"
  ENABLE_TEST_ENDPOINTS: "true"
  ENABLE_CORS_ALL_ORIGINS: "false"
  ENABLE_SWAGGER_UI: "true"
  ENABLE_METRICS_DEBUG: "false"
  ENABLE_PROFILING: "false"
  
  # Staging-specific integrations
  VAULT_SKIP_VERIFY: "false"
  ARGOCD_INSECURE: "false"
  GIT_CLONE_DEPTH: "5"
  
  # Performance settings (production-like)
  REQUEST_TIMEOUT: "30s"
  DB_CONNECTION_TIMEOUT: "15s"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "100"
  
  # Staging URLs and endpoints
  FRONTEND_URL: "https://staging.contextops.com"
  API_BASE_URL: "https://staging.contextops.com/api"
  WEBHOOKS_BASE_URL: "https://staging.contextops.com/webhooks"
  
  # Staging database settings
  DB_LOG_QUERIES: "false"
  DB_MIGRATE_ON_START: "true"
  
  # Staging message queue settings
  RABBITMQ_MANAGEMENT_ENABLED: "false"
  RABBITMQ_LOG_LEVEL: "warn"
  
  # Resource limits (staging)
  MAX_CONCURRENT_REQUESTS: "100"
  MAX_MEMORY_USAGE: "1Gi"
  MAX_CPU_USAGE: "1000m"
  
  # Testing and quality assurance
  ENABLE_E2E_TESTS: "true"
  ENABLE_LOAD_TESTING: "true"
  ENABLE_CHAOS_ENGINEERING: "false"
  
  # Monitoring and observability
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"
  METRICS_RETENTION: "7d"