# Development environment configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: environment-config
  namespace: platformctl-dev
  labels:
    app.kubernetes.io/name: environment-config
    app.kubernetes.io/part-of: platformctl-platform
    app.kubernetes.io/environment: development
  annotations:
    platformctl.io/environment: development
    platformctl.io/config-version: "1.0.0"
data:
  # Environment identification
  ENVIRONMENT: "development"
  ENVIRONMENT_SHORT: "dev"
  CLUSTER_NAME: "platformctl-dev-cluster"
  
  # Feature flags for development
  ENABLE_DEBUG_LOGGING: "true"
  ENABLE_TEST_ENDPOINTS: "true"
  ENABLE_CORS_ALL_ORIGINS: "true"
  ENABLE_SWAGGER_UI: "true"
  ENABLE_METRICS_DEBUG: "true"
  ENABLE_PROFILING: "true"
  
  # Development-specific integrations
  VAULT_SKIP_VERIFY: "true"
  ARGOCD_INSECURE: "true"
  GIT_CLONE_DEPTH: "1"
  
  # Performance settings (relaxed for development)
  REQUEST_TIMEOUT: "60s"
  DB_CONNECTION_TIMEOUT: "30s"
  RATE_LIMIT_ENABLED: "false"
  
  # Development URLs and endpoints
  FRONTEND_URL: "http://localhost:3000"
  API_BASE_URL: "https://platformctl-dev.example.com/api"
  WEBHOOKS_BASE_URL: "https://platformctl-dev.example.com/webhooks"
  
  # Development database settings
  DB_LOG_QUERIES: "true"
  DB_MIGRATE_ON_START: "true"
  
  # Development message queue settings
  RABBITMQ_MANAGEMENT_ENABLED: "true"
  RABBITMQ_LOG_LEVEL: "info"
  
  # Resource limits (development)
  MAX_CONCURRENT_REQUESTS: "50"
  MAX_MEMORY_USAGE: "512Mi"
  MAX_CPU_USAGE: "500m"